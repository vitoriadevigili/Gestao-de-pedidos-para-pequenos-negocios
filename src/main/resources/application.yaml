spring:
  application:
    name: Gestão pedidos

  datasource:
    url: jdbc:mysql://localhost:3306/gestao_pedidos
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

server:
  error:
    include-message: always
    include-binding-errors: always